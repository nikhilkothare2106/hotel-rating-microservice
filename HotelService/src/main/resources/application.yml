spring:
  application:
    name: HotelService
  # config:
  #   import: optional:configserver:${CONFIG_SERVER:http://localhost:8085}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    url: ${DATABASE_URL}
    username: ${MYSQL_ROOT:root}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  output:
    ansi:
      enabled: ALWAYS

server:
  port: ${SERVER_PORT:8082}


eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE}
  instance:
    prefer-ip-address: true
# debug: true

