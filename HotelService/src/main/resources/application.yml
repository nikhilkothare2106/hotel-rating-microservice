spring:
  application:
    name: HotelService
  # config:
  #   import: optional:configserver:${CONFIG_SERVER:http://localhost:8085}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/hotelservice}
    username: root
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  output:
    ansi:
      enabled: ALWAYS

server:
  port: ${SERVER_PORT:8082}


eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://serviceregistry:8761/eureka}
  instance:
    prefer-ip-address: true
# debug: true

