spring:
  application:
    name: ConfigServer

  # profiles:
  #   active: ${SPRING_PROFILES_ACTIVE:dev}

  output:
    ansi:
      enabled: ALWAYS

  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_URI:https://github.com/nikhilkothare2106/hotel-rating-microservice-config}
          clone-on-start: true
eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${DEFAULT_HOST_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

server:
  port: ${SERVER_PORT:8085}